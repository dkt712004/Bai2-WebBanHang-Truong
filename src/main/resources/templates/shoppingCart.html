<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - Dkt Shop</title>
    <link rel="stylesheet" type="text/css" th:href="@{/styles.css}">
</head>
<body>
<th:block th:insert="~{_header}"></th:block>
<th:block th:replace="~{_menu}"></th:block>

<div class="page-title">Giỏ hàng của bạn</div>

<!-- Kiểm tra nếu giỏ hàng trống -->
<div th:if="${cartForm == null || cartForm.cartLines == null || #lists.isEmpty(cartForm.cartLines)}">
    <h3>Không có sản phẩm nào trong giỏ.</h3>
    <a th:href="@{/productList}">Tiếp tục mua sắm</a>
</div>

<!-- Hiển thị danh sách nếu có hàng -->
<div th:if="${cartForm != null && !#lists.isEmpty(cartForm.cartLines)}">
    <form method="POST" th:object="${cartForm}" th:action="@{/shoppingCart}">
        <div class="product-preview-container" th:each="cartLineInfo, varStatus : ${cartForm.cartLines}" style="width: 100%; display: block; text-align: left; margin-bottom: 10px;">
            <input type="hidden" th:name="|cartLines[${varStatus.index}].productInfo.code|"
                   th:value="${cartLineInfo.productInfo.code}" />
            <img class="product-image" th:src="@{|/productImage?code=${cartLineInfo.productInfo.code}|}"
                 alt="Product Image" style="width:50px; height: 50px; vertical-align: middle;" />

            <span th:utext="${cartLineInfo.productInfo.name}"></span> -
            Giá: <span th:utext="${#numbers.formatDecimal(cartLineInfo.productInfo.price,3,0,'COMMA')}"></span>

            x <input th:name="|cartLines[${varStatus.index}].quantity|"
                     th:value="${cartLineInfo.quantity}"
                     title="Số lượng" style="width:40px" />

            = <span class="total" th:utext="${#numbers.formatDecimal(cartLineInfo.amount,3,0,'COMMA')}"></span>
            <a th:href="@{|/shoppingCartRemoveProduct?code=${cartLineInfo.productInfo.code}|}">Xóa</a>
        </div>

        <div style="margin-top:20px; padding: 10px;">
            <input type="submit" value="Cập nhật số lượng" />
            <a th:href="@{/shoppingCartConfirmation}"
               style="background: green; color: white; padding: 10px; text-decoration: none; font-weight: bold; margin-left: 20px;">
                Nhập thông tin giao hàng
            </a>
        </div>
    </form>
</div>
<th:block th:replace="~{_footer}"></th:block>
</body>
</html>
