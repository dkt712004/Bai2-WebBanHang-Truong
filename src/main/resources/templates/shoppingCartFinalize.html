<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công - Dkt Shop</title>
    <!-- Đảm bảo dòng dưới đây có dấu đóng } chính xác -->
    <link rel="stylesheet" type="text/css" th:href="@{/styles.css}">
</head>
<body>
<th:block th:replace="~{_header}"></th:block>
<th:block th:replace="~{_menu}"></th:block>

<div class="page-title" style="color: green;">Đặt hàng thành công!</div>

<div class="container" style="background: white; padding: 40px; border: 1px solid #ccc; text-align: center;">
    <h2 style="color: #28a745;">Cảm ơn bạn đã mua hàng!</h2>
    <p>Đơn hàng của bạn đã được hệ thống ghi nhận thành công.</p>

    <div style="margin: 20px 0; padding: 10px; background: #f9f9f9; display: inline-block; border-radius: 5px;">
        Mã số đơn hàng của bạn là:
        <b style="font-size: 1.5em; color: #333;" th:text="${lastOrderedCart.orderNum}"></b>
    </div>

    <p>Chúng tôi sẽ sớm liên hệ với bạn để xác nhận và giao hàng.</p>

    <br/>
    <a th:href="@{/productList}" style="background: #333; color: white; padding: 10px 20px; text-decoration: none;">
        Tiếp tục mua sắm
    </a>
</div>

<th:block th:replace="~{_footer}"></th:block>
</body>
</html>
