<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách đơn hàng - Dkt Shop</title>
    <link rel="stylesheet" type="text/css" th:href="@{/styles.css}">
</head>
<body>
<!-- Nhúng Header và Menu -->
<th:block th:replace="~{_header}"></th:block>
<th:block th:replace="~{_menu}"></th:block>

<div class="page-title">Quản lý đơn hàng</div>

<div class="container">
    <div style="margin-bottom: 10px;">
        Tổng số đơn hàng: <b th:text="${paginationResult.totalRecords}">0</b>
    </div>

    <!-- Thay border="1" bằng style border -->
    <table style="width:100%; border-collapse: collapse; border: 1px solid #ccc;">
        <thead>
        <tr style="background: #efefef;">
            <th style="border: 1px solid #ccc; padding: 8px;">Mã ĐH</th>
            <th style="border: 1px solid #ccc; padding: 8px;">Ngày đặt</th>
            <th style="border: 1px solid #ccc; padding: 8px;">Khách hàng</th>
            <th style="border: 1px solid #ccc; padding: 8px;">Địa chỉ</th>
            <th style="border: 1px solid #ccc; padding: 8px;">Email</th>
            <th style="border: 1px solid #ccc; padding: 8px;">Tổng tiền</th>
            <th style="border: 1px solid #ccc; padding: 8px;">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="orderInfo : ${paginationResult.list}">
            <td style="border: 1px solid #ccc; padding: 8px;" th:text="${orderInfo.orderNum}"></td>
            <td style="border: 1px solid #ccc; padding: 8px;" th:text="${#dates.format(orderInfo.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
            <td style="border: 1px solid #ccc; padding: 8px;" th:text="${orderInfo.customerName}"></td>
            <td style="border: 1px solid #ccc; padding: 8px;" th:text="${orderInfo.customerAddress}"></td>
            <td style="border: 1px solid #ccc; padding: 8px;" th:text="${orderInfo.customerEmail}"></td>
            <td style="border: 1px solid #ccc; padding: 8px; color:red; font-weight: bold;">
                <span th:text="${#numbers.formatDecimal(orderInfo.amount, 3, 0, 'COMMA')}"></span> VNĐ
            </td>
            <td style="border: 1px solid #ccc; padding: 8px;">
                <a th:href="@{|/admin/order?orderId=${orderInfo.id}|}"
                   style="color: blue; text-decoration: none;">Xem chi tiết</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(paginationResult.list)}">
            <td colspan="7" style="border: 1px solid #ccc; padding: 8px; text-align: center;">Chưa có đơn hàng nào.</td>
        </tr>
        </tbody>
    </table>

    <!-- Phân trang -->
    <div class="menu-container" th:if="${paginationResult.totalPages > 1}" style="margin-top: 20px; text-align: center;">
        <th:block th:each="page : ${paginationResult.navigationPages}">
            <a th:if="${page != -1}"
               th:href="@{|/admin/orderList?page=${page}|}"
               th:text="${page}"
               th:style="${page == paginationResult.currentPage} ? 'margin: 0 5px; padding: 5px 10px; border: 1px solid #ccc; background: #333; color: white;' : 'margin: 0 5px; padding: 5px 10px; border: 1px solid #ccc; color: black; text-decoration: none;'">
            </a>
            <span th:if="${page == -1}" style="margin: 0 5px;"> ... </span>
        </th:block>
    </div>
</div>

<th:block th:replace="~{_footer}"></th:block>
</body>
</html>
