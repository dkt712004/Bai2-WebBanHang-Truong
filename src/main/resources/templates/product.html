<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm</title>
    <link rel="stylesheet" type="text/css" th:href="@{/styles.css}">
</head>
<body>
<th:block th:replace="~{_header}"></th:block>
<th:block th:replace="~{_menu}"></th:block>

<div class="page-title">
    <h1 th:text="${productForm.newProduct} ? 'THÊM SẢN PHẨM MỚI' : 'SỬA SẢN PHẨM: ' + ${productForm.code}"></h1>
</div>

<div class="container" style="background: white; padding: 20px; border: 1px solid #ccc;">
    <form th:object="${productForm}" th:action="@{/admin/product}" method="POST" enctype="multipart/form-data">

        <input type="hidden" th:field="*{newProduct}" />

        <table style="width: 100%; border-collapse: collapse;">
            <tr>
                <td>Mã sản phẩm *</td>
                <td>
                    <input th:if="${productForm.newProduct}" type="text" th:field="*{code}" />
                    <th:block th:if="${!productForm.newProduct}">
                        <b th:text="*{code}" style="color:red"></b>
                        <input type="hidden" th:field="*{code}" />
                    </th:block>
                </td>
            </tr>
            <tr>
                <td>Tên sản phẩm *</td>
                <td><input type="text" th:field="*{name}" style="width: 400px;" /></td>
            </tr>
            <tr>
                <td>Giá bán *</td>
                <td><input type="number" th:field="*{price}" /></td>
            </tr>
            <tr>
                <td>Số lượng tồn *</td>
                <td><input type="number" th:field="*{stock}" /></td>
            </tr>
            <tr>
                <td>Ảnh hiện tại</td>
                <td>
                    <img th:if="${!productForm.newProduct}" th:src="@{|/productImage?code=${productForm.code}|}" width="100"/>
                </td>
            </tr>
            <tr>
                <td>Tải ảnh mới</td>
                <td><input type="file" th:field="*{fileData}" /></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <br/>
                    <button type="submit" style="background: blue; color: white; padding: 10px 20px; border: none; cursor: pointer;">LƯU SẢN PHẨM</button>
                    <a th:href="@{/productList}" style="margin-left: 10px;">Hủy bỏ</a>
                </td>
            </tr>
        </table>
    </form>
</div>
<th:block th:replace="~{_footer}"></th:block>
</body>
</html>
