<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thiết lập sản phẩm - Dkt Shop</title>
    <!-- Sửa lỗi: Đảm bảo có dấu } ở cuối biểu thức @{...} -->
    <link rel="stylesheet" type="text/css" th:href="@{/styles.css}">
</head>
<body>
<th:block th:replace="~{_header}"></th:block>
<th:block th:replace="~{_menu}"></th:block>

<div class="page-title" th:text="${productForm.newProduct} ? 'Thêm sản phẩm mới' : 'Chỉnh sửa sản phẩm'"></div>

<div class="container">
    <!-- Thông báo lỗi tổng quát từ Server nếu có -->
    <div th:if="${errorMessage != null}" class="error-message" th:text="${errorMessage}" style="margin-bottom: 15px;"></div>

    <!-- Form nhập sản phẩm: Cần enctype để upload ảnh -->
    <form th:object="${productForm}" th:action="@{/admin/product}" method="POST" enctype="multipart/form-data">

        <!-- Lưu trạng thái sản phẩm mới hay cũ -->
        <input type="hidden" th:field="*{newProduct}" />

        <table style="width: 100%; border-collapse: collapse;">
            <tr>
                <td>Mã sản phẩm *</td>
                <td>
                    <!-- Nếu là sản phẩm mới thì cho nhập mã, sản phẩm cũ thì chỉ hiển thị mã -->
                    <input th:if="${productForm.newProduct}" type="text" th:field="*{code}" placeholder="Ví dụ: S001" />
                    <th:block th:if="${!productForm.newProduct}">
                        <b th:text="*{code}"></b>
                        <input type="hidden" th:field="*{code}" />
                    </th:block>
                </td>
                <td class="error-message" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></td>
            </tr>

            <tr>
                <td>Tên sản phẩm *</td>
                <td><input type="text" th:field="*{name}" style="width: 300px;" /></td>
                <td class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></td>
            </tr>

            <tr>
                <td>Giá bán *</td>
                <td><input type="number" th:field="*{price}" step="0.01" /></td>
                <td class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></td>
            </tr>

            <tr>
                <td>Hình ảnh hiện tại</td>
                <td>
                    <img th:if="${!productForm.newProduct}"
                         th:src="@{|/productImage?code=${productForm.code}|}"
                         width="100" style="border: 1px solid #ccc;"/>
                    <span th:if="${productForm.newProduct}">Chưa có ảnh</span>
                </td>
                <td></td>
            </tr>

            <tr>
                <td>Tải ảnh mới</td>
                <td><input type="file" th:field="*{fileData}" /></td>
                <td></td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <br/>
                    <input type="submit" value="Lưu sản phẩm" style="background: #333; color: white; padding: 10px 20px; cursor: pointer;" />
                    <a th:href="@{/productList}" style="margin-left: 10px;">Hủy bỏ</a>
                </td>
                <td></td>
            </tr>
        </table>
    </form>
</div>

<th:block th:replace="~{_footer}"></th:block>
</body>
</html>
